    <style>
      /* Suppress transitions during initial CSR render to prevent flash.
         Only transitions are suppressed — NOT animations, because accordion
         open/close uses CSS animations which are separately guarded by the
         suppress_mount_anim mechanism in the collapsible primitive. */
      .preload,
      .preload * {
        transition-duration: 0s !important;
      }
    </style>
    <script>
      // Apply saved theme before any rendering to prevent flash of wrong theme.
      (function () {
        var c = document.cookie.split(";");
        for (var i = 0; i < c.length; i++) {
          var p = c[i].trim();
          if (p.indexOf("dx_theme=") === 0) {
            var t = decodeURIComponent(p.slice(9));
            if (t === "dark" || t === "light")
              document.documentElement.setAttribute("data-theme", t);
            break;
          }
        }
      })();
    </script>
