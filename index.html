<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dioxus Componentsdioxus | ⛺</title>
    <style>
      /* Suppress transitions during initial CSR render to prevent flash.
         Only transitions are suppressed — NOT animations, because accordion
         open/close uses CSS animations which are separately guarded by the
         suppress_mount_anim mechanism in the collapsible primitive. */
      .preload,
      .preload * {
        transition-duration: 0s !important;
      }
    </style>
    <script>
      // Apply saved theme before any rendering to prevent flash of wrong theme.
      (function () {
        var c = document.cookie.split(";");
        for (var i = 0; i < c.length; i++) {
          var p = c[i].trim();
          if (p.indexOf("dx_theme=") === 0) {
            var t = decodeURIComponent(p.slice(9));
            if (t === "dark" || t === "light")
              document.documentElement.setAttribute("data-theme", t);
            break;
          }
        }
      })();
    </script>
    <script>
      // FIX(wasm-split): The asset!() macro uses format!() to prepend the base
      // path to asset URLs, but format!() produces empty strings under wasm-split.
      // This MutationObserver rewrites /assets/ paths to include the base path.
      (function () {
        var scriptSrc = document.currentScript
          ? document.currentScript.src || ""
          : "";
        // Detect base path from the WASM script tag that dx build inserts,
        // or fall back to the current pathname up to the first segment.
        var base = "";
        var scripts = document.querySelectorAll('script[src*="/wasm/"]');
        if (scripts.length) {
          var m = scripts[0].getAttribute("src").match(/^(\/[^/]+)\/wasm\//);
          if (m) base = m[1];
        }
        if (!base) {
          var parts = location.pathname.split("/").filter(Boolean);
          if (parts.length > 0) base = "/" + parts[0];
        }
        if (!base) return;

        function fix(el) {
          ["href", "src"].forEach(function (attr) {
            var val = el.getAttribute(attr);
            if (val && val.startsWith("/assets/")) {
              el.setAttribute(attr, base + val);
            }
          });
        }

        new MutationObserver(function (mutations) {
          mutations.forEach(function (m) {
            m.addedNodes.forEach(function (n) {
              if (n.nodeType === 1) {
                fix(n);
                n.querySelectorAll &&
                  n.querySelectorAll("[href],[src]").forEach(fix);
              }
            });
          });
        }).observe(document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </head>
  <body class="preload">
    <div id="main"></div>
  <script type="module" async src="/dx-components/wasm/preview.js"></script>
            </body>
</html>
