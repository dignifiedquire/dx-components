<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dioxus Componentsdioxus | ⛺</title>
    <style>
      /* Suppress transitions during initial CSR render to prevent flash.
         Only transitions are suppressed — NOT animations, because accordion
         open/close uses CSS animations which are separately guarded by the
         suppress_mount_anim mechanism in the collapsible primitive. */
      .preload,
      .preload * {
        transition-duration: 0s !important;
      }
    </style>
    <script>
      // Apply saved theme before any rendering to prevent flash of wrong theme.
      (function () {
        var c = document.cookie.split(";");
        for (var i = 0; i < c.length; i++) {
          var p = c[i].trim();
          if (p.indexOf("dx_theme=") === 0) {
            var t = decodeURIComponent(p.slice(9));
            if (t === "dark" || t === "light")
              document.documentElement.setAttribute("data-theme", t);
            break;
          }
        }
      })();
    </script>
    <script>
      // FIX(wasm-split): The asset!() macro uses format!() to prepend the base
      // path to asset URLs, but format!() produces empty strings under wasm-split.
      // Override setAttribute to transparently prepend the base path to /assets/
      // URLs. This is more robust than a MutationObserver which can be killed by
      // the WASM runtime's DOM initialization.
      (function () {
        var base = null; // null = not yet detected, "" = no base path
        var orig = Element.prototype.setAttribute;

        function detectBase() {
          var scripts = document.querySelectorAll('script[src*="/wasm/"]');
          if (scripts.length) {
            var m = scripts[0].getAttribute("src").match(/^(\/[^/]+)\/wasm\//);
            if (m) return m[1];
          }
          return "";
        }

        Element.prototype.setAttribute = function (name, value) {
          if (
            (name === "href" || name === "src") &&
            typeof value === "string" &&
            value.startsWith("/assets/")
          ) {
            if (base === null) base = detectBase();
            if (base) value = base + value;
          }
          return orig.call(this, name, value);
        };
      })();
    </script>
  </head>
  <body class="preload">
    <div id="main"></div>
  <script type="module" async src="/dx-components/wasm/preview.js"></script>
            </body>
</html>
